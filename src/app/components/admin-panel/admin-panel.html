<div class="admin-container" style="padding: 20px;">
  <h2>Admin Dashboard - All Reservations</h2>

  <table mat-table [dataSource]="bookings" class="mat-elevation-z8" style="width: 100%;">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> Booking ID </th>
      <td mat-cell *matCellDef="let booking"> {{booking.id}} </td>
    </ng-container>

    <ng-container matColumnDef="guestName">
      <th mat-header-cell *matHeaderCellDef> Guest Name </th>
      <td mat-cell *matCellDef="let booking"> {{booking.guestName}} </td>
    </ng-container>

    <ng-container matColumnDef="roomId">
      <th mat-header-cell *matHeaderCellDef> Room </th>
      <td mat-cell *matCellDef="let booking"> {{booking.roomId}} </td>
    </ng-container>

    <ng-container matColumnDef="checkInDate">
      <th mat-header-cell *matHeaderCellDef> Check-In </th>
      <td mat-cell *matCellDef="let booking"> {{booking.checkInDate | date}} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let booking"> 
        <span [ngStyle]="{'color': booking.status === 'confirmed' ? 'green' : 'red'}">
          {{booking.status | uppercase}}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let booking">
        <button mat-button color="warn" (click)="cancelBooking(booking.id!)">Cancel</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
